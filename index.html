<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MenuQr — Smart Digital Menus & QR Ordering</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --y:#ffcf2d;--yd:#f0b800;--yt:#3a2c00;
  --b0:#000000;--b1:#0a0a0a;--b2:#111111;--b3:#1a1a1a;--b4:#242424;--b5:#2e2e2e;
  --w:#ffffff;--m:#999999;--m2:#555555;
  --r:100px;--t:.22s cubic-bezier(.4,0,.2,1);
  --sy:0 0 40px -8px rgba(255,207,45,.22);
  --syh:0 0 60px -8px rgba(255,207,45,.42);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--b1);color:var(--w);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--b2)}::-webkit-scrollbar-thumb{background:var(--y);border-radius:2px}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit;border:none;background:none}
.y{color:var(--y)}
.wrap{max-width:1160px;margin:0 auto;padding:0 clamp(1.2rem,5vw,2.5rem)}
section{padding:clamp(4rem,8vw,7.5rem) 0}

/* TYPOGRAPHY */
.dsp{font-family:'Manrope',sans-serif;font-size:clamp(2.3rem,6vw,5rem);font-weight:900;line-height:1.06;letter-spacing:-.03em}
.h2{font-family:'Manrope',sans-serif;font-size:clamp(1.7rem,3.5vw,2.7rem);font-weight:800;line-height:1.15;letter-spacing:-.02em}
.lbl{font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--y)}
.bod{font-size:.9rem;line-height:1.72;color:var(--m)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.5rem;font-family:'Manrope',sans-serif;font-weight:700;font-size:.9rem;padding:.8rem 1.85rem;border-radius:var(--r);transition:var(--t);white-space:nowrap;border:none;cursor:pointer;text-decoration:none}
.bp{background:linear-gradient(135deg,var(--y),var(--yd));color:var(--yt);box-shadow:var(--sy)}
.bp:hover{transform:translateY(-2px);box-shadow:var(--syh)}
.bo{background:transparent;color:var(--y);border:1.5px solid rgba(255,207,45,.3)}
.bo:hover{background:rgba(255,207,45,.07);border-color:var(--y);transform:translateY(-2px)}
.blg{padding:.95rem 2.1rem;font-size:.97rem}
.bfl{width:100%;justify-content:center}

/* LANG */
.lsw{display:flex;align-items:center;gap:.25rem;background:var(--b3);border-radius:var(--r);padding:.25rem;border:1px solid rgba(255,255,255,.06)}
.lb{font-family:'Manrope',sans-serif;font-size:.73rem;font-weight:700;padding:.25rem .7rem;border-radius:var(--r);transition:var(--t);color:var(--m);letter-spacing:.04em}
.lb.on{background:var(--y);color:var(--yt)}
.lb:hover:not(.on){color:var(--w)}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:900;padding:1.1rem 0;transition:background var(--t),padding var(--t)}
#nav.stuck{background:rgba(10,10,10,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:.75rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
.nr{display:flex;align-items:center;justify-content:space-between;gap:1.2rem}
.logo{font-family:'Manrope',sans-serif;font-weight:900;font-size:1.42rem;letter-spacing:-.02em}
.logo span{color:var(--y)}
.nl{display:flex;align-items:center;gap:2rem;list-style:none}
.nl a{font-size:.86rem;font-weight:500;color:var(--m);transition:color var(--t)}
.nl a:hover{color:var(--w)}
.nright{display:flex;align-items:center;gap:.9rem}
.hbg{display:none;flex-direction:column;gap:5px;padding:4px}
.hbg span{display:block;width:22px;height:2px;background:var(--w);border-radius:2px;transition:transform .3s,opacity .3s}
.hbg.on span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hbg.on span:nth-child(2){opacity:0}
.hbg.on span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mnav{position:fixed;inset:0;z-index:800;background:rgba(8,8,8,.97);backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;transform:translateY(-100%);transition:transform .42s cubic-bezier(.4,0,.2,1);pointer-events:none}
.mnav.on{transform:translateY(0);pointer-events:all}
.mnav a{font-family:'Manrope',sans-serif;font-size:1.8rem;font-weight:800;color:var(--m);transition:color var(--t)}
.mnav a:hover{color:var(--y)}
@media(max-width:840px){.nl{display:none}.hbg{display:flex}}
@media(max-width:540px){.nright .btn{display:none}}

/* HERO */
#hero{min-height:100svh;display:flex;align-items:center;padding-top:88px;background:var(--b0);position:relative;overflow:hidden}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,207,45,.026) 1px,transparent 1px),linear-gradient(90deg,rgba(255,207,45,.026) 1px,transparent 1px);background-size:54px 54px;mask-image:radial-gradient(ellipse 70% 70% at 50% 40%,black 30%,transparent 100%);pointer-events:none}
.hglow{position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:min(900px,120vw);height:560px;background:radial-gradient(ellipse,rgba(255,207,45,.07) 0%,transparent 65%);pointer-events:none}
.hi{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:2.5rem;align-items:center}
@media(max-width:880px){.hi{grid-template-columns:1fr}}
.hbadge{display:inline-flex;align-items:center;gap:.55rem;background:rgba(255,207,45,.08);border:1px solid rgba(255,207,45,.18);border-radius:var(--r);padding:.36rem 1rem;margin-bottom:1.7rem}
.dot{width:7px;height:7px;background:var(--y);border-radius:50%;animation:dp 2s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.6)}}
.htitle{margin-bottom:1.3rem}
.hsub{font-size:1.02rem;line-height:1.72;color:var(--m);max-width:510px;margin-bottom:2.4rem}
.hbtns{display:flex;flex-wrap:wrap;gap:.85rem;margin-bottom:2.2rem}
.htrust{display:flex;align-items:center;gap:.65rem;font-size:.82rem;color:var(--m);font-weight:500}
.htrust svg{stroke:var(--y);flex-shrink:0}

/* QR CARD */
.qf{animation:fl 4.5s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
.qcard{background:var(--b3);border-radius:20px;padding:1.7rem;width:200px;border:1px solid rgba(255,255,255,.05)}
.qframe{width:100%;aspect-ratio:1;background:var(--b4);border-radius:13px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;margin-bottom:.85rem}
.sl{position:absolute;left:8px;right:8px;height:2px;background:linear-gradient(90deg,transparent,var(--y),transparent);animation:sc 2.8s ease-in-out infinite}
@keyframes sc{0%{top:12%;opacity:0}15%{opacity:1}85%{opacity:1}100%{top:88%;opacity:0}}
.qname{font-family:'Manrope',sans-serif;font-weight:700;font-size:.8rem;text-align:center}
.qurl{font-size:.67rem;color:var(--m);text-align:center;margin-top:.18rem;font-family:monospace}
@media(max-width:880px){.qf{display:none}}

/* SECTION HEADER */
.sh{text-align:center;margin-bottom:clamp(2.2rem,5vw,3.8rem)}
.sh .lbl{display:block;margin-bottom:.75rem}
.sh .h2{margin-bottom:.85rem}
.sh .bod{max-width:490px;margin:0 auto}

/* SERVICES */
#services{background:var(--b2)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(265px,1fr));gap:1.3rem}
.sc{background:var(--b3);border-radius:24px;padding:1.9rem;position:relative;overflow:hidden;transition:background var(--t),transform var(--t)}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--y),var(--yd));transform:scaleX(0);transform-origin:left;transition:transform .38s ease}
.sc:hover{background:var(--b4);transform:translateY(-5px)}.sc:hover::after{transform:scaleX(1)}
.si{width:48px;height:48px;background:rgba(255,207,45,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:1.3rem}
.si svg{stroke:var(--y);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
.st{font-family:'Manrope',sans-serif;font-weight:700;font-size:.97rem;margin-bottom:.45rem}
.sd{font-size:.85rem;color:var(--m);line-height:1.66}

/* HOW */
#how{background:var(--b1)}
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1.8rem}
.step{text-align:center;padding:.8rem}
.sn{font-family:'Manrope',sans-serif;font-size:2.8rem;font-weight:900;color:rgba(255,207,45,.1);line-height:1;margin-bottom:.35rem}
.sico{width:58px;height:58px;background:rgba(255,207,45,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:.5rem auto 1rem}
.sico svg{stroke:var(--y);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round}
.step h3{font-family:'Manrope',sans-serif;font-weight:700;font-size:.93rem;margin-bottom:.42rem}
.step p{font-size:.82rem;color:var(--m);line-height:1.64}

/* PRICING */
#pricing{background:var(--b2)}
.pg{display:grid;grid-template-columns:repeat(auto-fit,minmax(265px,1fr));gap:1.4rem;align-items:start}
.pc{background:var(--b3);border-radius:24px;padding:2.1rem;position:relative;transition:transform var(--t)}
.pc:hover{transform:translateY(-5px)}
.pc.hot{background:var(--b4);outline:1.5px solid rgba(255,207,45,.26)}
.hbadge2{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--y),var(--yd));color:var(--yt);font-family:'Manrope',sans-serif;font-weight:700;font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;padding:.28rem 1.15rem;border-radius:var(--r);white-space:nowrap}
.ptag{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--y);margin-bottom:.55rem}
.pname{font-family:'Manrope',sans-serif;font-weight:700;font-size:.97rem;margin-bottom:.3rem}
.pnote{font-size:.81rem;color:var(--m);margin-bottom:1.5rem;line-height:1.5}
.pprice{display:flex;align-items:baseline;gap:.22rem;margin-bottom:1.5rem}
.pprice .num{font-family:'Manrope',sans-serif;font-weight:900;font-size:2.6rem;color:var(--y);line-height:1}
.pprice .cur{font-size:.82rem;font-weight:700;color:var(--y)}
.pprice .mo{font-size:.76rem;color:var(--m)}
.pfl{list-style:none;display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.9rem}
.pfl li{display:flex;align-items:flex-start;gap:.6rem;font-size:.84rem;color:var(--m);line-height:1.5}
.ck{flex-shrink:0;width:17px;height:17px;background:rgba(255,207,45,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:1px}
.ck svg{stroke:var(--y);stroke-width:2.5;fill:none;stroke-linecap:round}

/* DOMAIN */
#domain{background:var(--b1)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:1.7rem}
@media(max-width:680px){.dg{grid-template-columns:1fr}}
.dc{background:var(--b3);border-radius:24px;padding:2.2rem}
.dc.prem{background:var(--b4);outline:1.5px solid rgba(255,207,45,.2)}
.dbadge{display:flex;align-items:center;gap:.55rem;margin-bottom:1.2rem}
.dbi{font-size:1.25rem}
.dbt{font-family:'Manrope',sans-serif;font-weight:800;font-size:1.1rem}
.dbt.gld{color:var(--y)}
.durl{font-family:'Courier New',monospace;font-size:.82rem;color:var(--y);background:rgba(255,207,45,.07);padding:.42rem .85rem;border-radius:8px;display:inline-block;margin:.75rem 0 1.3rem}
.dlist{list-style:none;display:flex;flex-direction:column;gap:.65rem}
.dlist li{display:flex;align-items:center;gap:.6rem;font-size:.84rem;color:var(--m)}
.dlist li svg{stroke:var(--y);stroke-width:1.8;fill:none;stroke-linecap:round;flex-shrink:0}
.dprice{display:flex;align-items:baseline;gap:.22rem;margin-top:1.6rem}
.dprice .dn{font-family:'Manrope',sans-serif;font-weight:900;font-size:1.9rem;color:var(--y)}
.dprice .dc2{font-size:.85rem;font-weight:700;color:var(--y)}
.dprice .dy{font-size:.76rem;color:var(--m)}
.dcal{background:rgba(255,207,45,.06);border-left:3px solid var(--y);border-radius:0 9px 9px 0;padding:.85rem 1rem;margin-top:1.3rem;font-size:.83rem;color:var(--m);line-height:1.6}
.dcal strong{color:var(--w)}

/* FORM */
#contact{background:var(--b2)}
.fshell{max-width:650px;margin:0 auto;background:var(--b3);border-radius:26px;padding:clamp(1.7rem,5vw,2.9rem)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
@media(max-width:540px){.f2{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:.42rem}
.fg label{font-size:.7rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--m);transition:color var(--t)}
.fg:focus-within label{color:var(--y)}
.fg input,.fg select{background:var(--b4);border:none;border-bottom:2px solid transparent;border-radius:9px 9px 0 0;padding:.78rem .95rem;color:var(--w);font-family:'Inter',sans-serif;font-size:.9rem;outline:none;width:100%;transition:border-color var(--t),background var(--t);-webkit-appearance:none}
.fg select{cursor:pointer}.fg select option{background:var(--b4);color:var(--w)}
.fg input::placeholder{color:var(--m2)}
.fg input:focus,.fg select:focus{border-bottom-color:var(--y);background:var(--b5)}
.fact{margin-top:1.7rem;display:flex;flex-direction:column;gap:.9rem}
.fnote{text-align:center;font-size:.76rem;color:var(--m2);line-height:1.6;display:flex;align-items:flex-start;justify-content:center;gap:.38rem}
.fnote svg{stroke:var(--y);flex-shrink:0;margin-top:1px}

/* MARQUEE */
#marq{background:var(--b1);overflow:hidden;padding:2.4rem 0;border-top:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.04)}
.mq{display:flex;width:max-content;animation:mqr 30s linear infinite}
@keyframes mqr{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.mi{display:inline-flex;align-items:center;gap:.65rem;padding:0 2rem;font-family:'Manrope',sans-serif;font-weight:700;font-size:clamp(.88rem,2vw,1.05rem);color:var(--m);white-space:nowrap}
.ms{color:var(--y)}

/* FOOTER */
footer{background:var(--b0);padding:3.2rem 0 1.7rem}
.fr{display:flex;justify-content:space-between;align-items:flex-start;gap:2.2rem;flex-wrap:wrap;padding-bottom:2.2rem;margin-bottom:1.6rem;border-bottom:1px solid rgba(255,255,255,.05)}
.fb .logo{font-size:1.55rem;margin-bottom:.65rem;display:inline-block}
.fb p{font-size:.83rem;color:var(--m);max-width:275px;line-height:1.64}
.flinks{display:flex;flex-direction:column;gap:.5rem}
.flinks a{font-size:.85rem;color:var(--m);transition:color var(--t)}.flinks a:hover{color:var(--y)}
.fbot{display:flex;justify-content:space-between;flex-wrap:wrap;gap:.7rem}
.fbot p{font-size:.74rem;color:rgba(153,153,153,.4)}

/* WA FLOAT */
.wa{position:fixed;bottom:1.7rem;right:1.7rem;z-index:700;width:54px;height:54px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 22px rgba(37,211,102,.4);transition:transform var(--t),box-shadow var(--t);animation:wap 3s ease-in-out infinite}
@keyframes wap{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.wa:hover{transform:scale(1.12)!important;box-shadow:0 6px 34px rgba(37,211,102,.58)}

/* TOAST */
.toast{position:fixed;bottom:5.2rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--b4);color:var(--w);padding:.75rem 1.45rem;border-radius:var(--r);font-size:.84rem;z-index:9999;border:1px solid rgba(255,207,45,.2);box-shadow:0 8px 30px rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .28s,transform .28s;white-space:nowrap}
.toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}

/* REVEAL */
.rv{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.rv.sh2{opacity:1;transform:translateY(0)}
.d1{transition-delay:.08s}.d2{transition-delay:.16s}.d3{transition-delay:.24s}.d4{transition-delay:.32s}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- NAV -->
<nav id="nav">
  <div class="wrap">
    <div class="nr">
      <a href="#" class="logo">Menu<span>QR</span></a>
      <ul class="nl">
        <li><a href="#services" data-i="ns">Services</a></li>
        <li><a href="#pricing"  data-i="np">Pricing</a></li>
        <li><a href="#domain"   data-i="nd">Domain</a></li>
        <li><a href="#contact"  data-i="nc">Contact</a></li>
      </ul>
      <div class="nright">
        <div class="lsw">
          <button class="lb on" id="ben" onclick="setLang('en')">EN</button>
          <button class="lb"    id="bfr" onclick="setLang('fr')">FR</button>
        </div>
        <a href="#contact" class="btn bp" style="font-size:.8rem;padding:.6rem 1.3rem" data-i="cs">Start Now →</a>
      </div>
      <button class="hbg" id="hbg" onclick="toggleM()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<div class="mnav" id="mn">
  <a href="#services" onclick="closeM()" data-i="ns">Services</a>
  <a href="#pricing"  onclick="closeM()" data-i="np">Pricing</a>
  <a href="#domain"   onclick="closeM()" data-i="nd">Domain</a>
  <a href="#contact"  onclick="closeM()" data-i="nc">Contact</a>
  <div style="display:flex;gap:.5rem;margin-top:.8rem">
    <button class="lb on" id="mben" onclick="setLang('en')">EN</button>
    <button class="lb"    id="mbfr" onclick="setLang('fr')">FR</button>
  </div>
  <a href="#contact" onclick="closeM()" class="btn bp blg" data-i="cs">Start Now →</a>
</div>

<!-- HERO -->
<section id="hero">
  <div class="hgrid"></div>
  <div class="hglow"></div>
  <div class="wrap">
    <div class="hi">
      <div>
        <div class="hbadge rv"><span class="dot"></span><span class="lbl" data-i="hb"></span></div>
        <h1 class="dsp htitle rv d1"><span data-i="ht1"></span><br/><span class="y" data-i="ht2"></span><br/><span data-i="ht3"></span></h1>
        <p class="hsub rv d2" data-i="hs"></p>
        <div class="hbtns rv d3">
          <a href="#contact" class="btn bp blg" data-i="hd"></a>
          <a href="#contact" class="btn bo blg" data-i="hst"></a>
        </div>
        <div class="htrust rv d4">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span data-i="htr"></span>
        </div>
      </div>
      <div class="qf">
        <div class="qcard">
          <div class="qframe">
            <div class="sl"></div>
            <svg width="128" height="128" viewBox="0 0 100 100" fill="none">
              <rect x="10" y="10" width="26" height="26" rx="4" fill="none" stroke="#ffcf2d" stroke-width="2.8"/>
              <rect x="15" y="15" width="16" height="16" rx="2" fill="#ffcf2d"/>
              <rect x="64" y="10" width="26" height="26" rx="4" fill="none" stroke="#ffcf2d" stroke-width="2.8"/>
              <rect x="69" y="15" width="16" height="16" rx="2" fill="#ffcf2d"/>
              <rect x="10" y="64" width="26" height="26" rx="4" fill="none" stroke="#ffcf2d" stroke-width="2.8"/>
              <rect x="15" y="69" width="16" height="16" rx="2" fill="#ffcf2d"/>
              <rect x="44" y="10" width="5" height="5" rx="1" fill="#ffcf2d" opacity=".7"/>
              <rect x="44" y="17" width="5" height="5" rx="1" fill="#ffcf2d" opacity=".4"/>
              <rect x="44" y="24" width="5" height="5" rx="1" fill="#ffcf2d" opacity=".85"/>
              <rect x="10" y="44" width="5" height="5" rx="1" fill="#ffcf2d" opacity=".5"/>
              <rect x="17" y="44" width="5" height="5" rx="1" fill="#ffcf2d" opacity=".8"/>
              <rect x="24" y="44" width="5" height="5" rx="1" fill="#ffcf2d" opacity=".3"/>
              <rect x="44" y="44" width="5" height="5" rx="1" fill="#ffcf2d" opacity=".9"/>
              <rect x="51" y="44" width="5" height="5" rx="1" fill="#ffcf2d" opacity=".45"/>

/* ══════════════════════════════════
   LANGUAGE ENGINE
══════════════════════════════════ */
let lang='en';

function setLang(l){
  lang=l;
  const t=T[l];

  // text nodes
  const HTML_KEYS=['dpc'];
  document.querySelectorAll('[data-i]').forEach(el=>{
    const k=el.getAttribute('data-i');
    if(!t[k])return;
    if(HTML_KEYS.includes(k)){el.innerHTML=t[k];return;}
    el.textContent=t[k];
  });

  // select option texts
  ['fty','fpl','fdo'].forEach(id=>{
    const sel=document.getElementById(id);
    if(!sel)return;
    Array.from(sel.options).forEach(opt=>{
      const v=opt.getAttribute('data-'+l);
      if(v)opt.textContent=v;
      const di=opt.getAttribute('data-i');
      if(di&&t[di])opt.textContent=t[di];
    });
  });

  // placeholders
  document.querySelectorAll('[data-ph-'+l+']').forEach(el=>{
    el.placeholder=el.getAttribute('data-ph-'+l);
  });

  // lang button states
  ['ben','bfr','mben','mbfr'].forEach(id=>{
    const btn=document.getElementById(id);
    if(btn)btn.classList.toggle('on', (id==='ben'||id==='mben')?l==='en':l==='fr');
  });

  document.documentElement.lang=l;
}

/* ══════════════════════════════════
   PLAN BUTTONS
══════════════════════════════════ */
document.querySelectorAll('.pp').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const val=btn.getAttribute('data-val-'+lang)||btn.getAttribute('data-val-en');
    const sel=document.getElementById('fpl');
    for(let i=0;i<sel.options.length;i++){
      const ov=sel.options[i].getAttribute('data-'+lang)||sel.options[i].getAttribute('data-en')||'';
      if(ov===val){sel.selectedIndex=i;break;}
    }
    document.getElementById('contact').scrollIntoView({behavior:'smooth',block:'start'});
  });
});

document.getElementById('dpbtn').addEventListener('click',()=>{
  document.getElementById('fdo').selectedIndex=2;
  document.getElementById('contact').scrollIntoView({behavior:'smooth',block:'start'});
});

/* ══════════════════════════════════
   WHATSAPP — FIXED
   Uses location.href so mobile
   browsers never block it
══════════════════════════════════ */
function sendWA(){
  const t=T[lang];
  const name =document.getElementById('fn').value.trim();
  const biz  =document.getElementById('fb').value.trim();
  const phone=document.getElementById('fp').value.trim();

  const tyS =document.getElementById('fty');
  const plS =document.getElementById('fpl');
  const doS =document.getElementById('fdo');

  const typeV=tyS.selectedIndex>0?(tyS.options[tyS.selectedIndex].getAttribute('data-'+lang)||tyS.options[tyS.selectedIndex].textContent):'';
  const planV=plS.selectedIndex>0?(plS.options[plS.selectedIndex].getAttribute('data-'+lang)||plS.options[plS.selectedIndex].textContent):'';
  const domV =doS.selectedIndex>0?(doS.options[doS.selectedIndex].getAttribute('data-'+lang)||doS.options[doS.selectedIndex].textContent):'';

  if(!name||!biz||!phone||!typeV||!planV||!domV){
    toast(t.err);return;
  }

  const msg=[
    t.wa_hello,'',
    t.wa_name+': '+name,
    t.wa_biz +': '+biz,
    t.wa_phone+': '+phone,
    t.wa_type +': '+typeV,
    t.wa_plan +': '+planV,
    t.wa_domain+': '+domV,
    '',t.wa_close
  ].join('\n');

  // ✅ USE location.href — guaranteed to work on all mobile browsers
  window.location.href='https://wa.me/213541053547?text='+encodeURIComponent(msg);
}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('vis');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('vis'),3000);
}

/* ══════════════════════════════════
   NAVBAR SCROLL
══════════════════════════════════ */
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('stuck',scrollY>50);
},{passive:true});

/* ══════════════════════════════════
   MOBILE NAV
══════════════════════════════════ */
function toggleM(){
  const on=document.getElementById('mn').classList.toggle('on');
  document.getElementById('hbg').classList.toggle('on',on);
  document.body.style.overflow=on?'hidden':'';
}
function closeM(){
  document.getElementById('mn').classList.remove('on');
  document.getElementById('hbg').classList.remove('on');
  document.body.style.overflow='';
}

/* ══════════════════════════════════
   SCROLL REVEAL
══════════════════════════════════ */
const ro=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('sh2');ro.unobserve(e.target);}});
},{threshold:.1});
document.querySelectorAll('.rv').forEach(el=>ro.observe(el));

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
setLang('en');

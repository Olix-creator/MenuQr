<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --yellow:#FFD600;--yellow-dim:rgba(255,214,0,0.15);--yellow-glow:rgba(255,214,0,0.08);
  --green:#25D366;
}
[data-theme="dark"]{
  --bg:#0A0A0A;--bg2:#111111;--card:#111111;--border:#1E1E1E;
  --text:#ffffff;--text2:#cccccc;--muted:#888888;--muted2:#555555;
  --input-bg:#0d0d0d;--overlay:rgba(10,10,10,0.92);
  --shadow:rgba(0,0,0,0.4);--card-hover:rgba(255,214,0,0.04);
}
[data-theme="light"]{
  --bg:#f5f5f0;--bg2:#ffffff;--card:#ffffff;--border:#e0e0e0;
  --text:#111111;--text2:#333333;--muted:#666666;--muted2:#999999;
  --input-bg:#f8f8f8;--overlay:rgba(245,245,240,0.95);
  --shadow:rgba(0,0,0,0.08);--card-hover:rgba(255,214,0,0.06);
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow-x:hidden;transition:background .3s,color .3s}
::selection{background:rgba(255,214,0,0.3);color:var(--text)}
a{text-decoration:none;color:inherit}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;transition:all .3s}
.nav.scrolled{background:var(--overlay);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-box{width:36px;height:36px;border-radius:10px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;font-size:16px}
.logo span{font-weight:800;font-size:20px}.logo .y{color:var(--yellow)}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{font-size:14px;color:var(--muted);font-weight:500;transition:color .2s;cursor:pointer}
.nav-links a:hover{color:var(--yellow)}
.nav-controls{display:flex;gap:8px;align-items:center}
.ctrl-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;color:var(--text);font-size:14px;font-weight:700}
.ctrl-btn:hover{border-color:var(--yellow)}
.mobile-toggle{display:none;background:none;border:none;color:var(--text);cursor:pointer}
.mobile-menu{display:none;background:var(--overlay);padding:16px 24px 24px;flex-direction:column;gap:16px}
.mobile-menu.open{display:flex}
.mobile-menu a{font-size:18px;font-weight:600;padding:8px 0;color:var(--text2);cursor:pointer}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--yellow-dim);color:var(--yellow);border-radius:999px;padding:5px 14px;font-size:13px;font-weight:600;letter-spacing:.5px}

/* HERO */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 24px 80px;position:relative;overflow:hidden}
.hero-glow1{position:absolute;top:-30%;right:-20%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(255,214,0,0.03),transparent 70%)}
.hero-glow2{position:absolute;bottom:-20%;left:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,214,0,0.02),transparent 70%)}
.hero-content{max-width:800px;text-align:center;position:relative;z-index:1}
.hero h1{font-size:clamp(36px,7vw,64px);font-weight:900;line-height:1.08;margin:24px 0 20px;letter-spacing:-1px}
.hero h1 .hl{color:var(--yellow)}
.hero p{font-size:18px;color:var(--muted);max-width:560px;margin:0 auto 32px;line-height:1.6}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn-primary{padding:14px 32px;border-radius:12px;background:var(--yellow);color:#000;font-weight:700;font-size:16px;border:none;cursor:pointer;font-family:inherit;transition:transform .15s}
.btn-primary:hover{transform:translateY(-2px)}
.btn-outline{padding:14px 32px;border-radius:12px;background:transparent;color:var(--text);font-weight:600;font-size:16px;border:1.5px solid var(--border);cursor:pointer;font-family:inherit;transition:border-color .2s}
.btn-outline:hover{border-color:var(--yellow)}
.hero-trust{font-size:13px;color:var(--muted2);margin-top:20px}

/* SECTIONS */
.section{padding:80px 24px;max-width:1100px;margin:0 auto}
.section-header{text-align:center;margin-bottom:48px}
.section-header h2{font-size:clamp(28px,5vw,42px);font-weight:800;margin-top:16px}
.section-header p{color:var(--muted);margin-top:12px;font-size:16px}

/* SERVICES */
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.service-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;transition:transform .2s,border-color .2s}
.service-card:hover{transform:translateY(-4px);border-color:rgba(255,214,0,0.25)}
.service-icon{width:52px;height:52px;border-radius:14px;background:var(--yellow-dim);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.service-card h3{font-size:18px;font-weight:700;margin-bottom:8px}
.service-card p{color:var(--muted);font-size:14px;line-height:1.6}

/* PRICING */
.plans-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:40px}
.plan-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:32px 28px;position:relative;display:flex;flex-direction:column;min-height:420px;transition:transform .2s,box-shadow .2s}
.plan-card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(255,214,0,0.06)}
.plan-card.best{background:linear-gradient(165deg,rgba(26,23,0,0.6),var(--card) 40%);border-color:rgba(255,214,0,0.3)}
.plan-tag{position:absolute;top:-13px;left:24px;font-weight:700;font-size:12px;padding:4px 14px;border-radius:999px;text-transform:uppercase;color:#000}
.plan-card h3{font-size:22px;font-weight:700;margin-bottom:4px}
.plan-price{display:flex;align-items:baseline;gap:4px;margin-bottom:20px}
.plan-price .amount{font-size:38px;font-weight:800;color:var(--yellow)}
.plan-price .period{color:var(--muted);font-size:14px}
.plan-features{flex:1}
.plan-feature{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:14px;color:var(--text2)}
.plan-btn{margin-top:16px;width:100%;padding:13px 0;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:all .2s}
.plan-btn.filled{border:none;background:var(--yellow);color:#000}
.plan-btn.ghost{border:1.5px solid var(--border);background:transparent;color:var(--text)}
.plan-btn.ghost:hover{border-color:var(--yellow);color:var(--yellow)}

.extras-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.extra-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px}
.extra-card.lifetime{background:linear-gradient(165deg,rgba(26,18,0,0.5),var(--card) 40%);border:1.5px solid rgba(255,214,0,0.2)}
.extra-tag{font-size:12px;font-weight:600;padding:4px 12px;border-radius:999px;text-transform:uppercase;display:inline-block;margin-bottom:12px}
.extra-card h3{font-size:20px;font-weight:700;margin-bottom:4px}
.extra-price{display:flex;align-items:baseline;gap:4px;margin-bottom:16px}
.extra-price .amount{font-size:28px;font-weight:800;color:var(--yellow)}
.extra-feature{display:flex;gap:10px;align-items:center;margin-bottom:10px;font-size:14px;color:var(--text2)}
.extra-note{margin-top:12px;padding:10px 14px;background:rgba(255,255,255,0.03);border-radius:10px;font-size:12px;color:var(--muted)}
[data-theme="light"] .extra-note{background:rgba(0,0,0,0.03)}

/* TESTIMONIALS */
.testimonial-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 32px;min-height:200px;position:relative}
.testimonial-stars{display:flex;gap:4px;margin-bottom:16px}
.testimonial-text{font-size:18px;line-height:1.7;font-weight:500;color:var(--text2);margin-bottom:20px}
.testimonial-author span:first-child{font-weight:700;font-size:15px}
.testimonial-author span:last-child{color:var(--muted);font-size:13px;margin-left:8px}
.dots{display:flex;gap:8px;margin-top:20px}
.dot{height:10px;border-radius:99px;border:none;cursor:pointer;transition:all .3s}
.dot.active{width:32px;background:var(--yellow)}
.dot.inactive{width:10px;background:var(--border)}

/* FORM */
.form-section{max-width:600px;margin:0 auto;padding:80px 24px}
.form-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px}
.form-group{margin-bottom:16px}
.form-group label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block}
.form-input{width:100%;padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
.form-input:focus{border-color:var(--yellow)}
.form-input option{background:var(--card)}
.domain-toggle{display:flex;gap:12px}
.domain-btn{flex:1;padding:12px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.domain-btn.active{border:1.5px solid var(--yellow);background:var(--yellow-dim);color:var(--yellow)}
.domain-btn.inactive{border:1.5px solid var(--border);background:transparent;color:var(--muted)}
.submit-btn{margin-top:8px;width:100%;padding:16px;border-radius:14px;background:var(--yellow);color:#000;font-weight:800;font-size:17px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit;transition:transform .15s}
.submit-btn:hover{transform:translateY(-2px)}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:40px 24px;margin-top:40px}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:20px}
.footer-links{display:flex;gap:24px;font-size:13px}
.footer-links a{color:var(--muted)}
.footer-copy{max-width:1100px;margin:20px auto 0;text-align:center;color:var(--muted2);font-size:12px}

/* WHATSAPP FLOAT */
.wa-float{position:fixed;bottom:24px;right:24px;z-index:999;width:56px;height:56px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);cursor:pointer;transition:transform .2s}
.wa-float:hover{transform:scale(1.1)}

/* CHECK SVG */
.check{width:18px;height:18px;flex-shrink:0}
.star-svg{width:16px;height:16px;flex-shrink:0}

@media(max-width:768px){

  .mobile-toggle{display:flex !important}
  .nav-controls{gap:4px}

@media(min-width:769px){

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

function scrollTo(sel){ document.querySelector(sel)?.scrollIntoView({behavior:'smooth'}); }

function toggleTheme(){
  theme = theme==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",theme);
  document.getElementById("themeBtn").textContent = theme==="dark"?"☀️":"🌙";
}
function toggleLang(){
  lang = lang==="en"?"fr":"en";
  document.getElementById("langBtn").textContent = lang==="en"?"FR":"EN";
  render();
}
function toggleMobile(){
  document.getElementById("mobileMenu").classList.toggle("open");
}

function selectPlan(name){
  formData.plan = name;
  render();
  document.getElementById("order").scrollIntoView({behavior:"smooth"});
}

function submitForm(){
  const t = T[lang];
  if(!formData.fullName||!formData.businessName||!formData.phone){ alert(t.fillAll); return; }
  const msg = t.waMsg(formData);
  window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,"_blank");
}

function render(){
  const t = T[lang];

  // Nav
  let navH = "";
  t.nav.forEach((n,i) => { navH += `<a onclick="scrollTo('#${t.navIds[i]}');document.getElementById('mobileMenu').classList.remove('open')">${n}</a>`; });
  document.getElementById("navLinks").innerHTML = navH;
  document.getElementById("mobileMenu").innerHTML = navH;

  // Hero
  document.getElementById("heroBadge").innerHTML = t.heroBadge;
  document.getElementById("heroTitle").innerHTML = t.heroTitle;
  document.getElementById("heroSub").textContent = t.heroSub;
  document.getElementById("heroBtn1").textContent = t.heroBtn1;
  document.getElementById("heroBtn2").textContent = t.heroBtn2;
  document.getElementById("heroTrust").textContent = t.heroTrust;

  // Services
  document.getElementById("servicesBadge").textContent = t.servicesBadge;
  document.getElementById("servicesTitle").textContent = t.servicesTitle;
  let sH = "";
  t.services.forEach((s,i) => {
    sH += `<div class="service-card"><div class="service-icon">${serviceIcons[i]}</div><h3>${s.title}</h3><p>${s.desc}</p></div>`;
  });
  document.getElementById("servicesGrid").innerHTML = sH;

  // Pricing
  document.getElementById("pricingBadge").textContent = t.pricingBadge;
  document.getElementById("pricingTitle").textContent = t.pricingTitle;
  document.getElementById("pricingSub").textContent = t.pricingSub;
  let pH = "";
  t.plans.forEach(p => {
    const isBest = p.tag && (p.tag==="Best Value"||p.tag==="Meilleur rapport");
    const tagColor = isBest?"#FFD600": p.tag?"#25D366":"";
    pH += `<div class="plan-card ${isBest?'best':''}">`;
    if(p.tag) pH += `<div class="plan-tag" style="background:${tagColor}">${p.tag}</div>`;
    pH += `<h3>${p.name}</h3><div class="plan-price"><span class="amount">${p.price}</span><span class="period">${t.period}</span></div><div class="plan-features">`;
    p.features.forEach(f => { pH += `<div class="plan-feature">${svgCheck()}<span>${f}</span></div>`; });
    pH += `</div><button class="plan-btn ${isBest?'filled':'ghost'}" onclick="selectPlan('${p.name}')">${t.choose} ${p.name}</button></div>`;
  });
  document.getElementById("plansGrid").innerHTML = pH;

  // Extras
  let eH = `<div class="extra-card"><span class="extra-tag" style="background:rgba(99,102,241,0.2);color:#818cf8">${t.domainTag}</span><h3>${t.domainTitle}</h3><div class="extra-price"><span class="amount">${t.domainPrice}</span><span class="period" style="color:var(--muted);font-size:14px;margin-left:4px">${t.domainPeriod}</span></div>`;
  t.domainFeatures.forEach(f => { eH += `<div class="extra-feature">${svgCheck("#818cf8")}<span>${f}</span></div>`; });
  eH += `</div>`;
  eH += `<div class="extra-card lifetime"><span class="extra-tag" style="background:rgba(249,115,22,0.2);color:#f97316">${t.lifetimeTag}</span><h3>${t.lifetimeTitle}</h3><div class="extra-price"><span class="amount">${t.lifetimePrice}</span><span class="period" style="color:var(--muted);font-size:14px;margin-left:4px">${t.lifetimePeriod}</span></div>`;
  t.lifetimeFeatures.forEach(f => { eH += `<div class="extra-feature">${svgCheck()}<span>${f}</span></div>`; });
  eH += `<div class="extra-note">${t.lifetimeNote}</div><button class="btn-primary" style="width:100%;margin-top:14px;border-radius:12px;font-size:15px;padding:12px" onclick="selectPlan('Lifetime')">${t.choose} Lifetime</button></div>`;
  document.getElementById("extrasGrid").innerHTML = eH;

  // Testimonials
  document.getElementById("testBadge").textContent = t.testBadge;
  document.getElementById("testTitle").textContent = t.testTitle;
  renderTestimonial();

  // Form
  document.getElementById("formBadge").textContent = t.formBadge;
  document.getElementById("formTitle").textContent = t.formTitle;
  document.getElementById("formSub").textContent = t.formSub;
  const lb = t.labels, pl = t.placeholders;
  let fH = `
    <div class="form-group"><label>${lb.fullName}</label><input class="form-input" placeholder="${pl.fullName}" value="${formData.fullName}" oninput="formData.fullName=this.value"></div>
    <div class="form-group"><label>${lb.businessName}</label><input class="form-input" placeholder="${pl.businessName}" value="${formData.businessName}" oninput="formData.businessName=this.value"></div>
    <div class="form-group"><label>${lb.phone}</label><input class="form-input" type="tel" placeholder="${pl.phone}" value="${formData.phone}" oninput="formData.phone=this.value"></div>
    <div class="form-group"><label>${lb.type}</label><select class="form-input" onchange="formData.businessType=this.value">${t.types.map(o=>`<option value="${o}" ${formData.businessType===o?'selected':''}>${o}</option>`).join('')}</select></div>
    <div class="form-group"><label>${lb.plan}</label><select class="form-input" onchange="formData.plan=this.value">${t.planOptions.map(o=>`<option value="${o}" ${formData.plan===o?'selected':''}>${o}</option>`).join('')}</select></div>
    <div class="form-group"><label>${lb.domain}</label><div class="domain-toggle">
      <button class="domain-btn ${formData.domain==='Standard'?'active':'inactive'}" onclick="formData.domain='Standard';render()">${t.domainStd}</button>
      <button class="domain-btn ${formData.domain==='Premium'?'active':'inactive'}" onclick="formData.domain='Premium';render()">${t.domainPrem}</button>
    </div></div>
    <button class="submit-btn" onclick="submitForm()">${waIcon} ${t.submitBtn}</button>
  `;
  document.getElementById("formCard").innerHTML = fH;

  document.getElementById("footerDesc").textContent = t.footerDesc;
}

function renderTestimonial(){
  const t = T[lang];
  const tt = t.testimonials[activeTest];
  let h = `<div class="fade-in"><div class="testimonial-stars">${svgStar.repeat(5)}</div><div class="testimonial-text">"${tt.text}"</div><div class="testimonial-author"><span>${tt.name}</span><span>${tt.role}</span></div></div><div class="dots">`;
  t.testimonials.forEach((_,i) => { h += `<button class="dot ${i===activeTest?'active':'inactive'}" onclick="activeTest=${i};renderTestimonial()"></button>`; });
  h += `</div>`;
  document.getElementById("testCard").innerHTML = h;
}

// Init
document.getElementById("yr").textContent = new Date().getFullYear();
window.addEventListener("scroll",()=>{
  document.getElementById("mainNav").classList.toggle("scrolled",window.scrollY>40);
});
setInterval(()=>{ activeTest=(activeTest+1)%T[lang].testimonials.length; renderTestimonial(); },5000);
render();
</script>
</body>
</html>
